workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 30
    environment:
      flutter: 3.24.5
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug --target-platform android-arm64
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
