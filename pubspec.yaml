name: namaa_driver
description: Namaa Driver App — Professional ride-hailing driver application for Sudan.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.3

  # Backend
  supabase_flutter: ^2.8.4

  # Maps & Location
  google_maps_flutter: ^2.14.2
  geolocator: ^13.0.2
  flutter_polyline_points: ^2.1.0

  # Push Notifications
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  image_picker: ^1.1.2
  image_cropper: ^12.2.1
  pin_code_fields: ^8.0.1

  # Networking
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.0
  intl_phone_field: ^3.2.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  uuid: ^4.5.1
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts are loaded via google_fonts package — no local font files needed
