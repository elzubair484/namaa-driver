version: "2"
type: backend
tech_stack:
  - language: Python (test scripts call Supabase REST API directly)
  - framework: Supabase REST API v1
  - database: PostgreSQL via Supabase
  - other: Supabase Storage, Supabase Auth
test_credentials:
  supabase_url: https://ygvbangmbiywbdakcsnk.supabase.co
  supabase_anon_key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlndmJhbmdtYml5d2JkYWtjc25rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NzQ2MzgsImV4cCI6MjA5ODA1MDYzOH0.7LvUn_OO_RN-GtBs8s7SeT5Dq64jOHj-g_5zV8XMjyE
  test_email: driver@test.com
  test_password: wweerr123
features:
  - name: Authentication
    description: Email+Password login via Supabase Auth REST API
    files:
      - lib/features/auth/data/sources/auth_remote_source.dart
    endpoints:
      - method: POST
        path: https://ygvbangmbiywbdakcsnk.supabase.co/auth/v1/token?grant_type=password
        description: Sign in driver with email and password
        auth_required: false
        request_schema:
          body:
            email: string
            password: string
        response_schema:
          "200": "{access_token: string, token_type: bearer, user: object}"
          "400": "{error: string, error_description: string}"
      - method: POST
        path: https://ygvbangmbiywbdakcsnk.supabase.co/auth/v1/logout
        description: Sign out driver
        auth_required: true
        response_schema:
          "204": void
    depends_on: []

  - name: Driver Profile
    description: Fetch and update driver profile from drivers table
    files:
      - lib/features/auth/data/sources/auth_remote_source.dart
      - lib/features/onboarding/data/sources/onboarding_remote_source.dart
    endpoints:
      - method: GET
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/drivers?user_id=eq.{userId}&select=*
        description: Fetch driver profile by user_id
        auth_required: true
        response_schema:
          "200": "[{id, user_id, full_name, phone, email, status, rating, total_trips}]"
      - method: POST
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/drivers
        description: Upsert driver profile (onConflict user_id)
        auth_required: true
        request_schema:
          body:
            user_id: string
            full_name: string
            phone: string
            status: pending
            locale: ar
        response_schema:
          "201": "{id, user_id, full_name, phone, status}"
      - method: PATCH
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/drivers?id=eq.{driverId}
        description: Update driver status to under_review
        auth_required: true
        request_schema:
          body:
            status: under_review
        response_schema:
          "200": "{id, status}"
    depends_on:
      - Authentication

  - name: Trip History
    description: Paginated list of past trips for a driver
    files:
      - lib/features/history/data/sources/history_remote_source.dart
    endpoints:
      - method: GET
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/trips?driver_id=eq.{driverId}&order=requested_at.desc&limit=20&offset=0
        description: Fetch paginated trip history
        auth_required: true
        response_schema:
          "200": "[{id, status, driver_earnings, requested_at, completed_at}]"
      - method: GET
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/trips?id=eq.{tripId}&select=*
        description: Get trip details by ID
        auth_required: true
        response_schema:
          "200": "[{id, status, pickup_location, dropoff_location, driver_earnings}]"
    depends_on:
      - Authentication

  - name: Wallet
    description: Driver wallet balance and transaction history
    files:
      - lib/features/wallet/data/sources/wallet_remote_source.dart
    endpoints:
      - method: GET
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/driver_wallets?driver_id=eq.{driverId}&select=*
        description: Fetch driver wallet
        auth_required: true
        response_schema:
          "200": "[{id, driver_id, balance, total_earned, total_withdrawn}]"
      - method: GET
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/wallet_transactions?wallet_id=eq.{walletId}&order=created_at.desc&limit=30
        description: Fetch paginated transactions
        auth_required: true
        response_schema:
          "200": "[{id, type, amount, balance_before, balance_after, created_at}]"
      - method: POST
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/withdrawal_requests
        description: Submit a withdrawal request
        auth_required: true
        request_schema:
          body:
            driver_id: string
            wallet_id: string
            amount: number
            bank_name: string
            account_number: string
            account_name: string
        response_schema:
          "201": "{id, amount, status, bank_name}"
    depends_on:
      - Authentication

  - name: Notifications
    description: Fetch and mark notifications as read
    files:
      - lib/features/notifications/data/sources/notification_remote_source.dart
    endpoints:
      - method: GET
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/notifications?recipient_id=eq.{driverId}&order=created_at.desc&limit=50
        description: Fetch last 50 notifications
        auth_required: true
        response_schema:
          "200": "[{id, type, title_ar, body_ar, is_read, created_at}]"
      - method: PATCH
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/notifications?id=eq.{notificationId}
        description: Mark notification as read
        auth_required: true
        request_schema:
          body:
            is_read: true
            read_at: string
        response_schema:
          "200": void
    depends_on:
      - Authentication

  - name: Support Tickets
    description: Create and list support tickets and messages
    files:
      - lib/features/support/data/sources/support_remote_source.dart
    endpoints:
      - method: GET
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/support_tickets?driver_id=eq.{driverId}&order=created_at.desc
        description: List support tickets for driver
        auth_required: true
        response_schema:
          "200": "[{id, category, subject, status, created_at}]"
      - method: POST
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/support_tickets
        description: Create a new support ticket
        auth_required: true
        request_schema:
          body:
            driver_id: string
            category: string
            subject: string
        response_schema:
          "201": "{id, category, subject, status}"
      - method: POST
        path: https://ygvbangmbiywbdakcsnk.supabase.co/rest/v1/support_messages
        description: Send a message in a ticket
        auth_required: true
        request_schema:
          body:
            ticket_id: string
            sender_id: string
            sender_type: driver
            message: string
        response_schema:
          "201": "{id, ticket_id, message, created_at}"
    depends_on:
      - Authentication

known_limitations:
  - issue: No wallet row auto-created for new drivers — requires DB trigger
    location: lib/features/wallet/data/sources/wallet_remote_source.dart
    impact: Wallet endpoint returns empty for new drivers
  - issue: Support ticket creation is not atomic
    location: lib/features/support/data/sources/support_remote_source.dart
    impact: Orphaned tickets possible if message insert fails
